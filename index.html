<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Flap</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050811; /* Sehr tiefes, mystisches Dunkelblau */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }
        
        /* Dezente Anleitung oben */
        .instructions {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: #5c697a;
            font-size: 0.95rem;
            letter-spacing: 1px;
            line-height: 1.6;
            pointer-events: none;
            z-index: 10;
        }

        .game-title {
            display: block;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .highlight {
            color: #00f0ff; /* Leuchtendes Cyan */
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="instructions">
    <span class="game-title">The Flap</span>
    <span class="highlight">Press SPACEBAR or CLICK</span> 
</div>

<script>
let currentA, currentB, currentC, currentD; 
let points = [];
let maxPoints = 1900; 
let wingAngle = 0;
let isFlapping = false;
let flapSpeed = 0.25;

function setup() {
    createCanvas(windowWidth, windowHeight);
    triggerButterflyEffect(); 
}

function draw() {
    background(5, 8, 17, 20); // Perfekt ausbalancierter Schweifeffekt
    
    // 1. CHAOS-SYSTEM IM HINTERGRUND
    translate(width / 2, height * 0.55);
    noStroke();
    
    for (let p of points) {
        let nextX = sin(currentA * p.y) + currentC * cos(currentA * p.x);
        let nextY = sin(currentB * p.x) + currentD * cos(currentB * p.y);
        
        p.x = nextX;
        p.y = nextY;
        
        let screenX = p.x * (width * 0.18);
        let screenY = p.y * (height * 0.22);
        
        let d = dist(0, 0, screenX, screenY);
        // Edler Farbverlauf von Cyan zu Tiefblau/Violett mit hoher Transparenz
        fill(map(nextX, -2, 2, 0, 150), map(d, 0, width*0.3, 180, 255), 255, 25);
        
        ellipse(screenX, screenY, 1.8, 1.8);
    }
    
    // 2. DER NEUE EDLE SCHMETTERLING
    drawPremiumButterfly();
}

function drawPremiumButterfly() {
    push();
    resetMatrix();
    translate(width / 2, height * 0.55);
    
    // Schlagen der Flügel animieren
    if (isFlapping) {
        wingAngle += flapSpeed;
        if (wingAngle > Math.PI) {
            isFlapping = false;
            wingAngle = 0;
        }
    }
    
    // Berechnung des Stauchungsfaktors für das Schlagen (3D-Effekt)
    let wingScaleX = isFlapping ? cos(wingAngle) : 1;
    
    // --- FLÜGEL ZEICHNEN ---
    noStroke();
    
    // Rechter Flügel (Vorder- und Hinterflügel geschichtet für Tiefe)
    push();
    scale(wingScaleX, 1);
    
    // Großer Oberflügel
    fill(0, 240, 255, 40); // Äußerer Glow
    bezier(0, -5, 45, -55, 85, -35, 5, 0);
    fill(0, 210, 255, 120); // Kern
    bezier(0, -5, 40, -48, 75, -30, 5, 0);
    
    // Kleiner Unterflügel
    fill(0, 150, 255, 50);
    bezier(0, 2, 55, 25, 45, 50, 2, 10);
    fill(0, 120, 255, 110);
    bezier(0, 2, 48, 22, 40, 42, 2, 10);
    pop();
    
    // Linker Flügel (Spiegelung durch negative Scale)
    push();
    scale(-wingScaleX, 1);
    
    // Großer Oberflügel
    fill(0, 240, 255, 40);
    bezier(0, -5, 45, -55, 85, -35, 5, 0);
    fill(0, 210, 255, 120);
    bezier(0, -5, 40, -48, 75, -30, 5, 0);
    
    // Kleiner Unterflügel
    fill(0, 150, 255, 50);
    bezier(0, 2, 55, 25, 45, 50, 2, 10);
    fill(0, 120, 255, 110);
    bezier(0, 2, 48, 22, 40, 42, 2, 10);
    pop();
    
    // --- FILIGRANER KÖRPER ---
    // Sanfter Glow hinter dem Körper
    fill(255, 255, 255, 30);
    ellipse(0, 0, 8, 38);
    
    // Scharfer weißer Rumpf
    fill(245, 248, 255);
    ellipse(0, -2, 4, 28); // Hauptkörper
    ellipse(0, -16, 5.5, 5.5); // Kopf
    
    // Hauchdünne, elegante Fühler
    stroke(230, 240, 255, 200);
    strokeWeight(0.8);
    noFill();
    bezier(0, -17, 3, -24, 6, -26, 10, -26); // Rechts
    bezier(0, -17, -3, -24, -6, -26, -10, -26); // Links
    
    pop();
}

function triggerButterflyEffect() {
    isFlapping = true;
    wingAngle = 0;
    
    // Mathematisch optimierte Werte für spektakuläre, ästhetische Netze
    currentA = random(-2.3, 2.3);
    currentB = random(-2.3, 2.3);
    currentC = random(-1.9, 1.9);
    currentD = random(-1.9, 1.9);
    
    points = [];
    for (let i = 0; i < maxPoints; i++) {
        points.push({
            x: random(-0.05, 0.05),
            y: random(-0.05, 0.05)
        });
    }
}

function keyPressed() {
    if (key === ' ') {
        triggerButterflyEffect();
    }
}

function mousePressed() {
    if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
        triggerButterflyEffect();
    }
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
